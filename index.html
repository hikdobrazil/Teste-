<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sansão & Pompom: A Caçada Pixelada</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #2c1626; /* Fundo escuro retro */
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            touch-action: manipulation;
            image-rendering: pixelated; /* Força o visual quadriculado */
        }

        /* Interface Superior (Placar e Tempo) */
        #ui-layer {
            padding: 15px;
            background: #180c14;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            z-index: 10;
            border-bottom: 4px solid #4a2540;
        }

        .score-board { color: #f1c40f; }
        .timer-board { color: #e74c3c; }

        .cat-icon-ui {
            width: 20px; height: 20px;
            vertical-align: middle;
            margin-right: 5px;
        }

        /* Tabuleiro do Jogo */
        #game-board {
            flex-grow: 1;
            position: relative;
            background-color: #795548; /* Cor de piso de madeira retro */
            background-image: linear-gradient(45deg, #6d4c41 25%, transparent 25%, transparent 75%, #6d4c41 75%, #6d4c41), linear-gradient(45deg, #6d4c41 25%, transparent 25%, transparent 75%, #6d4c41 75%, #6d4c41);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            overflow: hidden;
            border-top: 4px solid #3e2723;
        }

        /* O Ratinho Pixelado */
        .mouse {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
            animation: popIn 0.2s steps(4) forwards; /* Animação em quadros estilo retro */
        }

        .mouse svg {
            width: 50px; height: 50px;
            filter: drop-shadow(0px 4px 0px rgba(0,0,0,0.4));
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Telas de Menu */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(24, 12, 20, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }

        h1 { color: #f1c40f; font-size: 1.5rem; margin-bottom: 10px; text-shadow: 3px 3px 0px #d35400; line-height: 1.5; }
        h2 { font-size: 0.8rem; margin-bottom: 30px; line-height: 1.5; color: #bdc3c7;}

        .btn {
            background: #2c3e50;
            color: white;
            border: 4px solid #fff;
            padding: 15px 20px;
            font-size: 0.8rem;
            font-family: inherit;
            margin: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 6px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #000;
        }

        .btn-sansao { background: #2c3e50; border-color: #3498db; }
        .btn-pompom { background: #2c3e50; border-color: #9b59b6; }

        .hidden { display: none !important; }
        
        #hunter-name { color: #fff; }
    </style>
</head>
<body>

    <svg style="display: none;">
        <g id="rat-pixel">
            <rect x="2" y="5" width="6" height="3" fill="#95a5a6"/> <rect x="8" y="6" width="1" height="1" fill="#000"/>     <rect x="7" y="4" width="2" height="2" fill="#bdc3c7"/> <rect x="6" y="3" width="1" height="1" fill="#FFB6C1"/> <rect x="0" y="6" width="2" height="1" fill="#FFB6C1"/> </g>
        
        <g id="sansao-pixel">
            <rect x="1" y="0" width="2" height="2" fill="#111"/> <rect x="7" y="0" width="2" height="2" fill="#111"/> <rect x="1" y="2" width="8" height="6" fill="#111"/> <rect x="2" y="4" width="2" height="2" fill="#FFD700"/> <rect x="6" y="4" width="2" height="2" fill="#FFD700"/> <rect x="4" y="6" width="2" height="1" fill="#333"/> </g>

        <g id="pompom-pixel">
            <rect x="1" y="0" width="2" height="2" fill="#8B4513"/> <rect x="7" y="0" width="2" height="2" fill="#8B4513"/> <rect x="1" y="2" width="8" height="3" fill="#8B4513"/> <rect x="2" y="2" width="1" height="1" fill="#111"/> <rect x="5" y="2" width="1" height="1" fill="#111"/> <rect x="7" y="2" width="1" height="1" fill="#111"/> <rect x="1" y="5" width="8" height="3" fill="#FFF"/> <rect x="2" y="4" width="2" height="2" fill="#2ecc71"/> <rect x="6" y="4" width="2" height="2" fill="#2ecc71"/> <rect x="4" y="6" width="2" height="1" fill="#FFB6C1"/> </g>
    </svg>

    <div id="ui-layer">
        <div class="score-board">PTS:<span id="score">0</span></div>
        <div>
            <svg class="cat-icon-ui" viewBox="0 0 10 10" id="ui-cat-icon"><use href="#sansao-pixel"/></svg>
            <span id="hunter-name">SANSÃO</span>
        </div>
        <div class="timer-board">T:<span id="time">30</span></div>
    </div>

    <div id="game-board"></div>

    <div id="start-screen" class="screen">
        <h1>A CAÇADA<br>16-BITS</h1>
        <h2>ESCOLHA SEU FELINO</h2>
        
        <button class="btn btn-sansao" onclick="startGame('Sansão', '#sansao-pixel')">
            <svg width="30" height="30" viewBox="0 0 10 10"><use href="#sansao-pixel"/></svg>
            SANSÃO
        </button>
        
        <button class="btn btn-pompom" onclick="startGame('Pompom', '#pompom-pixel')">
            <svg width="30" height="30" viewBox="0 0 10 10"><use href="#pompom-pixel"/></svg>
            POMPOM
        </button>
        
        <p style="margin-top: 30px; font-size: 0.6rem; color: #7f8c8d; line-height: 1.5;">
            * Aumente o volume!<br>Os sons atrairão os gatos reais.
        </p>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="color: #e74c3c;">FIM DE JOGO</h1>
        <h2><span id="final-hunter"></span> CAÇOU<br><span id="final-score" style="color: #f1c40f; font-size: 1.5rem;">0</span> RATOS</h2>
        <button class="btn" style="justify-content: center; width: 200px;" onclick="resetGame()">REJOGAR</button>
    </div>

    <script>
        // --- MOTOR DE ÁUDIO FELINO ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Guincho agudo (captura)
        function playSqueak() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'square'; // Usando onda quadrada para soar mais como um "jogo retro" 8-bits
            const baseFreq = 8000 + Math.random() * 2000; 
            osc.frequency.setValueAtTime(baseFreq, now);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.1);

            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.2);
        }

        // Rastejo (aparição)
        function playRustle() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const bufferSize = audioCtx.sampleRate * 0.15;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 6000; // Frequência alta para atrair gatos

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.5, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start(now);
        }

        // --- LÓGICA DO JOGO ---
        let score = 0;
        let timeLeft = 30;
        let gameTimer;
        let spawnTimer;
        let isPlaying = false;
        let board = document.getElementById('game-board');

        function startGame(hunterName, catSvgId) {
            initAudio(); 
            
            // Atualiza a UI com o gato escolhido
            document.getElementById('hunter-name').innerText = hunterName.toUpperCase();
            document.getElementById('ui-cat-icon').innerHTML = `<use href="${catSvgId}"/>`;
            
            if (catSvgId === '#sansao-pixel') document.getElementById('hunter-name').style.color = '#3498db';
            if (catSvgId === '#pompom-pixel') document.getElementById('hunter-name').style.color = '#9b59b6';

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            
            score = 0;
            timeLeft = 30;
            updateUI();
            isPlaying = true;

            gameTimer = setInterval(countdown, 1000);
            spawnMouse();
        }

        function countdown() {
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('time').innerText = timeLeft;
        }

        function spawnMouse() {
            if (!isPlaying) return;

            playRustle(); // Som de farfalhar

            const mouse = document.createElement('div');
            mouse.classList.add('mouse');
            // Insere o SVG do ratinho
            mouse.innerHTML = '<svg viewBox="0 0 10 10"><use href="#rat-pixel"/></svg>';
            
            const maxX = board.clientWidth - 60;
            const maxY = board.clientHeight - 60;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            mouse.style.left = `${randomX}px`;
            mouse.style.top = `${randomY}px`;

            // Evento para toque mobile e mouse
            mouse.addEventListener('touchstart', catchMouse, { passive: false });
            mouse.addEventListener('mousedown', catchMouse);

            board.appendChild(mouse);

            // Tempo de vida do rato reduzido para ficar mais dinâmico
            const aliveTime = 500 + Math.random() * 500;
            
            const deathTimer = setTimeout(() => {
                if (board.contains(mouse)) {
                    board.removeChild(mouse);
                }
            }, aliveTime);

            mouse.dataset.timerId = deathTimer;

            // Próximo rato
            const nextSpawn = 300 + Math.random() * 600;
            spawnTimer = setTimeout(spawnMouse, nextSpawn);
        }

        function catchMouse(e) {
            e.preventDefault(); 
            const mouse = e.currentTarget; // Garante que pega o container div.mouse e não o SVG dentro
            
            if (!board.contains(mouse)) return;

            playSqueak(); // Guincho de captura

            clearTimeout(mouse.dataset.timerId);
            board.removeChild(mouse);
            
            score += 10;
            updateUI();

            // Efeito de flash na tela estilo arcade
            board.style.backgroundColor = '#e74c3c';
            setTimeout(() => { board.style.backgroundColor = ''; }, 50);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimer);
            
            board.innerHTML = '';
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-hunter').innerText = document.getElementById('hunter-name').innerText;
            document.getElementById('end-screen').classList.remove('hidden');
        }

        function resetGame() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
