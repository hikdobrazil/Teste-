<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sansão & Pompom: A Caçada</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        * { box-sizing: border-box; user-select: none; }
        
        body {
            font-family: 'Fredoka One', cursive, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            touch-action: manipulation; /* Evita zoom no double tap */
        }

        #ui-layer {
            padding: 15px;
            background: #1a252f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .score-board { color: #f1c40f; }
        .timer-board { color: #e74c3c; }

        #game-board {
            flex-grow: 1;
            position: relative;
            background: #27ae60;
            overflow: hidden;
            border-top: 4px solid #2ecc71;
            cursor: crosshair;
        }

        /* Estilo do Ratinho */
        .mouse {
            position: absolute;
            font-size: 3rem;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
            /* Animação de pulsar para chamar atenção */
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Telas de Menu */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }

        h1 { color: #f1c40f; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 0px #d35400; }
        h2 { font-size: 1.5rem; margin-bottom: 30px; }

        .btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: inherit;
            border-radius: 30px;
            margin: 10px;
            box-shadow: 0 6px 0 #d35400;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #d35400;
        }

        .btn-sansao { background: #3498db; box-shadow: 0 6px 0 #2980b9; }
        .btn-pompom { background: #9b59b6; box-shadow: 0 6px 0 #8e44ad; }

        .hidden { display: none !important; }
        
        #hunter-name { color: #3498db; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="score-board">🐾 Pontos: <span id="score">0</span></div>
        <div>🐱 <span id="hunter-name">Sansão</span></div>
        <div class="timer-board">⏱ <span id="time">30</span>s</div>
    </div>

    <div id="game-board"></div>

    <div id="start-screen" class="screen">
        <h1>A Caçada!</h1>
        <h2>Quem vai caçar hoje?</h2>
        <button class="btn btn-sansao" onclick="startGame('Sansão')">Jogar com Sansão</button>
        <button class="btn btn-pompom" onclick="startGame('Pompom')">Jogar com Pompom</button>
        <p style="margin-top: 20px; font-size: 0.9rem; color: #bdc3c7;">
            Aumente o volume! Os sons de alta frequência vão atrair os caçadores de verdade.
        </p>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1>Fim de Jogo!</h1>
        <h2><span id="final-hunter"></span> pegou <span id="final-score"></span> ratinhos!</h2>
        <button class="btn" onclick="resetGame()">Jogar Novamente</button>
    </div>

    <script>
        // --- MOTOR BIOACÚSTICO OTIMIZADO PARA MOBILE ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Toca um guincho agudo (audível para humanos, mas irresistível para gatos)
        function playSqueak() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            // Frequência entre 10kHz e 14kHz para o celular conseguir reproduzir e você conseguir ouvir
            const baseFreq = 10000 + Math.random() * 4000; 
            osc.frequency.setValueAtTime(baseFreq, now);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.1);

            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.5, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.2);
        }

        // Toca o farfalhar de folhas rápido
        function playRustle() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 8000;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.8, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start(now);
        }

        // --- LÓGICA DO JOGO ---
        let score = 0;
        let timeLeft = 30;
        let gameTimer;
        let spawnTimer;
        let isPlaying = false;
        let board = document.getElementById('game-board');

        function startGame(hunter) {
            initAudio(); // Exige interação do usuário para ligar o áudio no mobile
            
            document.getElementById('hunter-name').innerText = hunter;
            if (hunter === 'Sansão') document.getElementById('hunter-name').style.color = '#3498db';
            if (hunter === 'Pompom') document.getElementById('hunter-name').style.color = '#9b59b6';

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            
            score = 0;
            timeLeft = 30;
            updateUI();
            isPlaying = true;

            // Inicia os timers
            gameTimer = setInterval(countdown, 1000);
            spawnMouse();
        }

        function countdown() {
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('time').innerText = timeLeft;
        }

        function spawnMouse() {
            if (!isPlaying) return;

            // Toca som de rastejo ao aparecer
            playRustle();

            const mouse = document.createElement('div');
            mouse.classList.add('mouse');
            mouse.innerHTML = '🐁';
            
            // Posição aleatória considerando o tamanho do rato (60px)
            const maxX = board.clientWidth - 60;
            const maxY = board.clientHeight - 60;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            mouse.style.left = `${randomX}px`;
            mouse.style.top = `${randomY}px`;

            // Evento de toque (otimizado para mobile)
            mouse.addEventListener('touchstart', catchMouse, { passive: false });
            mouse.addEventListener('mousedown', catchMouse);

            board.appendChild(mouse);

            // O rato some depois de um tempo aleatório (0.6s a 1.2s)
            const aliveTime = 600 + Math.random() * 600;
            
            const deathTimer = setTimeout(() => {
                if (board.contains(mouse)) {
                    board.removeChild(mouse);
                }
            }, aliveTime);

            mouse.dataset.timerId = deathTimer;

            // Próximo rato aparece rápido
            const nextSpawn = 400 + Math.random() * 500;
            spawnTimer = setTimeout(spawnMouse, nextSpawn);
        }

        function catchMouse(e) {
            e.preventDefault(); // Evita scroll acidental no celular
            const mouse = e.target;
            
            if (!board.contains(mouse)) return;

            // Toca o guincho de captura
            playSqueak();

            clearTimeout(mouse.dataset.timerId);
            board.removeChild(mouse);
            
            score += 10;
            updateUI();

            // Feedback visual rápido
            board.style.backgroundColor = '#2ecc71';
            setTimeout(() => { board.style.backgroundColor = '#27ae60'; }, 100);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimer);
            
            // Limpa o tabuleiro
            board.innerHTML = '';
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-hunter').innerText = document.getElementById('hunter-name').innerText;
            document.getElementById('end-screen').classList.remove('hidden');
        }

        function resetGame() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
