<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sansão & Pompom: A Caçada</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #d4a373; /* Cor da parede de fundo */
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            touch-action: manipulation;
        }

        /* --- UI BAR (Barra Superior) --- */
        #ui-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            background-color: transparent;
            z-index: 10;
        }

        .ui-element {
            background-color: #5d4037;
            border: 3px solid #3e2723;
            border-radius: 8px;
            padding: 8px 10px;
            color: #fff;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 0 #3e2723;
        }

        .hearts { font-size: 1rem; letter-spacing: -2px; color: #e74c3c; }
        .score-text { color: #81d4fa; }
        .time-text { color: #fff; }

        /* --- BANNER CENTRAL --- */
        #banner-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 10px;
            z-index: 10;
        }

        #banner {
            background-color: #6a1b9a; /* Roxo da imagem */
            border: 4px solid #f1c40f; /* Borda amarela */
            border-radius: 8px;
            padding: 15px 20px;
            color: #f1c40f;
            text-align: center;
            font-size: 0.8rem;
            line-height: 1.5;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
            position: relative;
        }

        /* --- ÁREA DO JOGO E PRATELEIRAS --- */
        #game-board {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        .shelf {
            position: absolute;
            width: 100%;
            height: 20px;
            background-color: #8d6e63;
            border-top: 4px solid #a1887f;
            border-bottom: 4px solid #5d4037;
            box-shadow: 0 10px 10px rgba(0,0,0,0.1);
        }

        /* Posição das 3 prateleiras */
        #shelf-1 { top: 25%; }
        #shelf-2 { top: 55%; }
        #shelf-3 { top: 85%; }

        /* --- O RATINHO --- */
        .mouse {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            cursor: pointer;
            z-index: 5;
        }

        .mouse svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 4px 0px rgba(0,0,0,0.3));
        }

        /* Animação de correr da esquerda para a direita */
        @keyframes runRight {
            0% { transform: translateX(-60px); }
            100% { transform: translateX(110vw); }
        }
        
        /* Animação de correr da direita para a esquerda */
        @keyframes runLeft {
            0% { transform: translateX(110vw) scaleX(-1); }
            100% { transform: translateX(-60px) scaleX(-1); }
        }

        /* --- TELAS DE INÍCIO E FIM --- */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .btn-start {
            background-color: #f1c40f;
            color: #000;
            border: 4px solid #e67e22;
            padding: 15px 30px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 6px 0 #d35400;
        }
        .btn-start:active { transform: translateY(6px); box-shadow: none; }
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <svg style="display: none;">
        <g id="rat-pixel">
            <rect x="2" y="5" width="6" height="3" fill="#7f8c8d"/>
            <rect x="8" y="6" width="1" height="1" fill="#000"/>
            <rect x="7" y="4" width="2" height="2" fill="#95a5a6"/>
            <rect x="6" y="3" width="1" height="1" fill="#e74c3c"/>
            <rect x="0" y="6" width="2" height="1" fill="#e74c3c"/>
        </g>
    </svg>

    <div id="ui-bar">
        <div class="ui-element">
            🐱 <span class="hearts" id="hearts-display">❤️❤️❤️</span>
        </div>
        <div class="ui-element">
            🐟 <span class="score-text" id="score">000</span>
        </div>
        <div class="ui-element">
            ⏱️ <span class="time-text" id="time">02:30</span>
        </div>
    </div>

    <div id="banner-container">
        <div id="banner">
            SANSÃO E POMPOM:<br>A CAÇADA
        </div>
    </div>

    <div id="game-board">
        <div class="shelf" id="shelf-1"></div>
        <div class="shelf" id="shelf-2"></div>
        <div class="shelf" id="shelf-3"></div>
    </div>

    <div id="start-screen" class="screen-overlay">
        <button class="btn-start" onclick="startGame()">▶ INICIAR CAÇADA</button>
    </div>

    <div id="end-screen" class="screen-overlay hidden">
        <h2 style="color:#fff;">FIM DO TEMPO</h2>
        <p style="color:#f1c40f; font-size:1.5rem;">SCORE: <span id="final-score">0</span></p>
        <button class="btn-start" onclick="location.reload()">JOGAR NOVAMENTE</button>
    </div>

    <script>
        // --- MOTOR BIOACÚSTICO ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSqueak() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(8000, now);
            osc.frequency.exponentialRampToValueAtTime(12000, now + 0.1);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.2);
        }

        function playRustle() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const bufferSize = audioCtx.sampleRate * 0.15;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 6000;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.5, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(now);
        }

        // --- LÓGICA DO JOGO ---
        let score = 0;
        let totalSeconds = 150; // 02:30 em segundos
        let gameTimer, spawnTimer;
        let isPlaying = false;
        const board = document.getElementById('game-board');

        // Posição Y das prateleiras para o rato correr em cima delas
        const shelfPositions = [25, 55, 85]; 

        function formatTime(sec) {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            return `0${m}:${s < 10 ? '0'+s : s}`;
        }

        function startGame() {
            initAudio();
            document.getElementById('start-screen').classList.add('hidden');
            isPlaying = true;
            gameTimer = setInterval(countdown, 1000);
            spawnMouse();
        }

        function countdown() {
            totalSeconds--;
            document.getElementById('time').innerText = formatTime(totalSeconds);
            if (totalSeconds <= 0) endGame();
        }

        function spawnMouse() {
            if (!isPlaying) return;
            playRustle();

            const mouse = document.createElement('div');
            mouse.classList.add('mouse');
            mouse.innerHTML = '<svg viewBox="0 0 10 10"><use href="#rat-pixel"/></svg>';

            // Escolhe uma prateleira aleatória
            const randomShelf = shelfPositions[Math.floor(Math.random() * shelfPositions.length)];
            // Ajusta o rato para ficar exatamente EM CIMA da linha da prateleira
            mouse.style.top = `calc(${randomShelf}% - 48px)`; 

            // Decide a direção (Esquerda para Direita ou Direita para Esquerda)
            const goRight = Math.random() > 0.5;
            
            // Define a velocidade da corrida (entre 1.5 e 3 segundos para atravessar a tela)
            const speed = (1.5 + Math.random() * 1.5).toFixed(2);

            if (goRight) {
                mouse.style.animation = `runRight ${speed}s linear forwards`;
            } else {
                mouse.style.animation = `runLeft ${speed}s linear forwards`;
            }

            // Eventos de toque
            mouse.addEventListener('touchstart', catchMouse, { passive: false });
            mouse.addEventListener('mousedown', catchMouse);

            board.appendChild(mouse);

            // Remove o rato do HTML assim que a animação dele terminar
            setTimeout(() => {
                if (board.contains(mouse)) board.removeChild(mouse);
            }, speed * 1000);

            // Próximo spawn mais rápido (entre 0.4 e 1.2 segundos)
            spawnTimer = setTimeout(spawnMouse, 400 + Math.random() * 800);
        }

        function catchMouse(e) {
            e.preventDefault();
            const mouse = e.currentTarget;
            if (!board.contains(mouse)) return;

            playSqueak();
            board.removeChild(mouse);
            
            score += 10;
            // Atualiza o placar mantendo 3 dígitos (ex: 010, 120)
            document.getElementById('score').innerText = score.toString().padStart(3, '0');

            // Efeito de acerto no fundo
            document.body.style.backgroundColor = '#e67e22';
            setTimeout(() => { document.body.style.backgroundColor = '#d4a373'; }, 100);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimer);
            board.innerHTML = '';
            document.getElementById('final-score').innerText = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
