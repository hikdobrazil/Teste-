<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>A Caçada - Edição PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           DESIGN SYSTEM & VARIÁVEIS CSS
           ========================================= */
        :root {
            --wall-color: #d4a373;
            --shelf-top: #a1887f;
            --shelf-front: #8d6e63;
            --shelf-bottom: #5d4037;
            --ui-bg: rgba(44, 62, 80, 0.85);
            --text-main: #ecf0f1;
            --accent-color: #f1c40f;
            --danger-color: #e74c3c;
        }

        /* RESET & BASE */
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: var(--wall-color);
            margin: 0; padding: 0;
            height: 100vh; height: 100dvh; /* Suporte para telas dinâmicas mobile */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none; /* Bloqueia qualquer gesto nativo do navegador */
        }

        /* =========================================
           UI (USER INTERFACE)
           ========================================= */
        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10px; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
        }

        .ui-pill {
            background-color: var(--ui-bg);
            backdrop-filter: blur(5px); /* Glassmorphism */
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            color: var(--text-main);
            font-size: 0.7rem;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .score-val { color: #2ecc71; }
        .time-val { color: var(--accent-color); }

        #banner {
            align-self: center; margin-top: 10px; z-index: 100;
            background: #6a1b9a; border: 3px solid var(--accent-color);
            padding: 15px; border-radius: 8px; color: var(--accent-color);
            font-size: 0.8rem; text-align: center; line-height: 1.4;
            box-shadow: 0 8px 0 rgba(0,0,0,0.4);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        /* =========================================
           GAME WORLD (CENÁRIO)
           ========================================= */
        #game-stage { flex-grow: 1; position: relative; overflow: hidden; perspective: 1000px; }

        .shelf {
            position: absolute; width: 100%; height: 24px;
            background-color: var(--shelf-front);
            border-top: 6px solid var(--shelf-top);
            border-bottom: 6px solid var(--shelf-bottom);
            box-shadow: 0 15px 20px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* O Ratinho com Aceleração de Hardware */
        .mouse {
            position: absolute; width: 65px; height: 65px;
            display: flex; justify-content: center; align-items: flex-end;
            cursor: pointer; z-index: 20;
            will-change: transform; /* Dica para a GPU: este elemento vai animar */
        }

        .mouse svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0px 8px 4px rgba(0,0,0,0.4));
        }

        /* =========================================
           EFEITOS ESPECIAIS (PARTÍCULAS)
           ========================================= */
        .floating-text {
            position: absolute; color: var(--accent-color);
            font-size: 1rem; font-weight: bold;
            text-shadow: 2px 2px 0 #000; z-index: 100;
            pointer-events: none;
            animation: floatUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(1.5); opacity: 0; }
        }

        /* =========================================
           MENUS (OVERLAYS)
           ========================================= */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; opacity: 1; transition: opacity 0.3s ease;
        }

        .hidden { opacity: 0; pointer-events: none; }

        .btn {
            background: var(--accent-color); color: #000;
            border: 4px solid #e67e22; border-radius: 8px;
            padding: 18px 30px; font-family: inherit; font-size: 1rem;
            cursor: pointer; box-shadow: 0 6px 0 #d35400;
            margin: 10px; transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 #d35400; }
        
        .cat-selection { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-cat { background: #34495e; color: white; border-color: #2c3e50; box-shadow: 0 6px 0 #1a252f; }
        .btn-cat.active { background: #2ecc71; border-color: #27ae60; box-shadow: 0 6px 0 #1e8449; }

    </style>
</head>
<body>

    <svg style="display: none;">
        <g id="rat-sprite">
            <rect x="2" y="5" width="6" height="3" fill="#7f8c8d"/>
            <rect x="8" y="6" width="1" height="1" fill="#000"/>
            <rect x="7" y="4" width="2" height="2" fill="#95a5a6"/>
            <rect x="6" y="3" width="1" height="1" fill="#e74c3c"/>
            <rect x="0" y="6" width="2" height="1" fill="#e74c3c"/>
        </g>
    </svg>

    <header id="top-bar">
        <div class="ui-pill">🐾 <span id="ui-hunter">SANSÃO</span></div>
        <div class="ui-pill">🐟 <span class="score-val" id="ui-score">000</span></div>
        <div class="ui-pill">⏱️ <span class="time-val" id="ui-time">02:30</span></div>
    </header>

    <div id="banner">SANSÃO E POMPOM<br>A CAÇADA</div>

    <main id="game-stage">
        </main>

    <div id="menu-start" class="overlay">
        <h1 style="color: white; text-align: center; line-height: 1.5; margin-bottom: 40px;">
            A CAÇADA<br><span style="color: var(--accent-color); font-size: 0.6em;">EDITION PRO</span>
        </h1>
        <p style="color: #bdc3c7; font-size: 0.6rem; margin-bottom: 10px;">SELECIONE O CAÇADOR:</p>
        <div class="cat-selection">
            <button class="btn btn-cat active" id="btn-sansao" onclick="app.selectHunter('SANSÃO')">SANSÃO</button>
            <button class="btn btn-cat" id="btn-pompom" onclick="app.selectHunter('POMPOM')">POMPOM</button>
        </div>
        <button class="btn" onclick="app.startGame()">INICIAR CAÇADA ▶</button>
    </div>

    <div id="menu-gameover" class="overlay hidden">
        <h2 style="color: var(--danger-color); font-size: 2rem;">FIM DO TEMPO</h2>
        <p style="color: white; font-size: 1rem; margin: 20px 0;">
            <span id="end-hunter"></span> CAÇOU:<br>
            <span id="end-score" style="color: var(--accent-color); font-size: 2.5rem; display: block; margin-top: 15px;">000</span>
        </p>
        <button class="btn" onclick="location.reload()">NOVA PARTIDA 🔄</button>
    </div>

    <script>
        /**
         * ENGINE BIOACÚSTICA (Web Audio API)
         * Gerencia sons sintéticos em tempo real sem arquivos externos.
         */
        class AudioEngine {
            constructor() {
                this.ctx = null;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }

            playSqueak() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(8000, now);
                osc.frequency.exponentialRampToValueAtTime(14000, now + 0.1); // High pitch atraente
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now); osc.stop(now + 0.2);
            }

            playRustle() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const bufferSize = this.ctx.sampleRate * 0.15;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = 6000;
                
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.5, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                
                noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
                noise.start(now);
            }
        }

        /**
         * CONTROLADOR PRINCIPAL DO JOGO
         * Gerencia Estado, Lógica, Dificuldade e Renderização.
         */
        class GameController {
            constructor() {
                this.audio = new AudioEngine();
                this.stage = document.getElementById('game-stage');
                
                // Variáveis de Estado
                this.isPlaying = false;
                this.score = 0;
                this.timeRemaining = 150; // 2:30
                this.hunter = 'SANSÃO';
                
                // Configuração de Dificuldade
                this.baseSpeed = 2.5; // Segundos para cruzar a tela
                this.spawnRate = 1200; // Milissegundos entre ratos
                
                // Timers
                this.gameLoop = null;
                this.spawnLoop = null;
                
                this.setupEnvironment();
            }

            // Constrói as prateleiras dinamicamente no DOM
            setupEnvironment() {
                const shelfPositions = [25, 55, 85];
                shelfPositions.forEach(pos => {
                    const shelf = document.createElement('div');
                    shelf.className = 'shelf';
                    shelf.style.top = `${pos}%`;
                    shelf.dataset.y = pos;
                    this.stage.appendChild(shelf);
                });
            }

            selectHunter(name) {
                this.hunter = name;
                document.getElementById('ui-hunter').innerText = name;
                document.getElementById('btn-sansao').classList.toggle('active', name === 'SANSÃO');
                document.getElementById('btn-pompom').classList.toggle('active', name === 'POMPOM');
            }

            startGame() {
                this.audio.init();
                document.getElementById('menu-start').classList.add('hidden');
                
                this.isPlaying = true;
                this.score = 0;
                this.updateUI();
                
                this.gameLoop = setInterval(() => this.tick(), 1000);
                this.spawnEntity();
            }

            tick() {
                this.timeRemaining--;
                this.updateUI();
                if (this.timeRemaining <= 0) this.endGame();
            }

            updateUI() {
                const m = Math.floor(this.timeRemaining / 60);
                const s = this.timeRemaining % 60;
                document.getElementById('ui-time').innerText = `0${m}:${s.toString().padStart(2, '0')}`;
                document.getElementById('ui-score').innerText = this.score.toString().padStart(3, '0');
            }

            // Calcula a dificuldade baseado na pontuação (Acelera o jogo)
            applyDifficultyCurve() {
                const multiplier = Math.min(this.score / 100, 2); // Max dificuldade em 200 pontos
                const currentSpeed = Math.max(0.8, this.baseSpeed - multiplier); // Rato mais rápido
                const currentSpawnRate = Math.max(400, this.spawnRate - (multiplier * 400)); // Mais ratos
                return { currentSpeed, currentSpawnRate };
            }

            spawnEntity() {
                if (!this.isPlaying) return;
                
                this.audio.playRustle();
                const diff = this.applyDifficultyCurve();
                const shelves = document.querySelectorAll('.shelf');
                const randomShelf = shelves[Math.floor(Math.random() * shelves.length)];
                
                const mouse = document.createElement('div');
                mouse.className = 'mouse';
                mouse.innerHTML = '<svg viewBox="0 0 10 10"><use href="#rat-sprite"/></svg>';
                
                // Posiciona perfeitamente sobre a prateleira
                mouse.style.top = `calc(${randomShelf.dataset.y}% - 60px)`;
                
                // Lógica de Movimento via Web Animations API (Mais performático que CSS Keyframes)
                const isGoingRight = Math.random() > 0.5;
                const startX = isGoingRight ? -80 : window.innerWidth + 20;
                const endX = isGoingRight ? window.innerWidth + 20 : -80;
                
                if (!isGoingRight) mouse.style.transform = 'scaleX(-1)'; // Vira o SVG

                this.stage.appendChild(mouse);

                // Animação Acelerada por GPU
                const anim = mouse.animate([
                    { transform: `translate3d(${startX}px, 0, 0) ${!isGoingRight ? 'scaleX(-1)' : ''}` },
                    { transform: `translate3d(${endX}px, 0, 0) ${!isGoingRight ? 'scaleX(-1)' : ''}` }
                ], {
                    duration: diff.currentSpeed * 1000,
                    easing: 'linear'
                });

                // Remove do DOM quando sair da tela
                anim.onfinish = () => mouse.remove();

                // Interação (Otimizado para Touch)
                const hitEvent = (e) => {
                    e.preventDefault();
                    if (!this.stage.contains(mouse)) return;
                    
                    // Pega posição exata do clique para a partícula
                    const rect = mouse.getBoundingClientRect();
                    this.handleHit(rect.left + rect.width / 2, rect.top);
                    
                    anim.cancel();
                    mouse.remove();
                };

                mouse.addEventListener('touchstart', hitEvent, { passive: false });
                mouse.addEventListener('mousedown', hitEvent);

                // Agenda o próximo spawn
                this.spawnLoop = setTimeout(() => this.spawnEntity(), diff.currentSpawnRate + Math.random() * 500);
            }

            handleHit(x, y) {
                this.audio.playSqueak();
                this.score += 10;
                this.updateUI();

                // Feedback Visual (Tela piscando sutilmente)
                document.body.style.backgroundColor = 'var(--danger-color)';
                setTimeout(() => document.body.style.backgroundColor = 'var(--wall-color)', 50);

                // Partícula flutuante (+10)
                const particle = document.createElement('div');
                particle.className = 'floating-text';
                particle.innerText = '+10';
                particle.style.left = `${x - 20}px`;
                particle.style.top = `${y}px`;
                this.stage.appendChild(particle);
                
                setTimeout(() => particle.remove(), 600);
            }

            endGame() {
                this.isPlaying = false;
                clearInterval(this.gameLoop);
                clearTimeout(this.spawnLoop);
                
                // Limpa os ratos restantes
                document.querySelectorAll('.mouse').forEach(m => m.remove());
                
                document.getElementById('end-score').innerText = this.score.toString().padStart(3, '0');
                document.getElementById('end-hunter').innerText = this.hunter;
                document.getElementById('menu-gameover').classList.remove('hidden');
            }
        }

        // Inicializa a aplicação
        const app = new GameController();

    </script>
</body>
</html>
