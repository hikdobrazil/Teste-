<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show do Milhão Bíblico</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #000080; /* Azul clássico do programa */
            color: #FFFF00; /* Amarelo clássico */
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            max-width: 800px;
            margin: 0 auto;
            border: 4px solid #FFFF00;
            padding: 20px;
            background-color: #000040;
            box-shadow: 10px 10px 0px #000000;
        }
        h1 {
            font-size: 24px;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
        }
        .premio {
            font-size: 12px;
            color: #00FF00;
            margin-bottom: 20px;
        }
        .host-box {
            background-color: #FFF;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            border: 4px solid #000;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }
        .host-box::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #FFF transparent transparent transparent;
            transform: translateX(-50%);
        }
        #question {
            font-size: 16px;
            margin: 30px 0;
            color: #FFF;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }
        .btn-resp {
            background-color: #000080;
            color: #FFF;
            border: 2px solid #FFF;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }
        .btn-resp:hover {
            background-color: #FFFF00;
            color: #000;
        }
        .btn-resp:disabled {
            background-color: #333;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }
        .helps {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            border-top: 2px dashed #FFFF00;
            padding-top: 20px;
        }
        .btn-help {
            background-color: #FF0000;
            color: #FFF;
            border: 4px solid #8B0000;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
        }
        .btn-help:hover {
            background-color: #FF6347;
        }
        .btn-help:disabled {
            background-color: #555;
            border-color: #222;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>SHOW DO MILHÃO BÍBLICO</h1>
        <div class="premio">VALENDO: UMA PASSAGEM SÓ DE IDA PARA CURIONÓPOLIS!</div>
        
        <div class="host-box" id="host-message">
            Pastor André Fernandes: "A paz do Senhor, jogador! Você está preparado? Vamos testar seus conhecimentos na Palavra!"
        </div>

        <div id="quiz-area">
            <div id="question">Carregando pergunta...</div>
            <div class="btn-container" id="options">
                </div>
        </div>

        <div class="helps">
            <button class="btn-help" id="btn-alunos" onclick="usarAlunos()">ALUNOS SOLUS SCRIPTURA</button>
            <button class="btn-help" id="btn-pulo" onclick="usarPulo()">PULAR (<span id="qtd-pulos">3</span>x)</button>
            <button class="btn-help" id="btn-marcus" onclick="usarMarcus()">MARCUS DA MÍDIA (Cartas)</button>
        </div>
    </div>

    <script>
        const perguntas = [
            {
                q: "Quem foi engolido por um grande peixe após tentar fugir do chamado de Deus?",
                options: ["Pedro", "Jonas", "Paulo", "João"],
                answer: 1
            },
            {
                q: "Quantos dias e noites choveu ininterruptamente durante o Dilúvio?",
                options: ["7", "12", "40", "100"],
                answer: 2
            },
            {
                q: "Quem o Apóstolo Paulo chama de 'meu verdadeiro filho na fé' nas cartas pastorais?",
                options: ["Timóteo", "Barnabé", "Silas", "Lucas"],
                answer: 0
            },
            {
                q: "Qual era a profissão de Mateus antes de ser chamado por Jesus?",
                options: ["Pescador", "Carpinteiro", "Cobrador de Impostos", "Fedor de tendas"],
                answer: 2
            },
            {
                q: "Quem cortou o cabelo de Sansão, fazendo-o perder sua força?",
                options: ["Raabe", "Dalila", "Ester", "Rute"],
                answer: 1
            }
        ];

        let perguntaAtual = 0;
        let pulosRestantes = 3;
        let alunosUsado = false;
        let marcusUsado = false;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const hostMsgEl = document.getElementById('host-message');

        function carregarPergunta() {
            if (perguntaAtual >= perguntas.length) {
                venceuJogo();
                return;
            }

            const p = perguntas[perguntaAtual];
            questionEl.innerText = p.q;
            optionsEl.innerHTML = '';

            p.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-resp';
                btn.innerText = `${index + 1}) ${opt}`;
                btn.onclick = () => checarResposta(index);
                btn.id = `opt-${index}`;
                optionsEl.appendChild(btn);
            });

            hostMsgEl.innerText = 'Pastor André Fernandes: "Valendo a passagem para Curionópolis! Qual a resposta correta?"';
        }

        function checarResposta(selectedIndex) {
            const correta = perguntas[perguntaAtual].answer;
            if (selectedIndex === correta) {
                hostMsgEl.innerText = 'Pastor André Fernandes: "Ceeeerta Resposta! Glória a Deus! Vamos para a próxima!"';
                perguntaAtual++;
                setTimeout(carregarPergunta, 2000);
            } else {
                hostMsgEl.innerText = 'Pastor André Fernandes: "Que pena! Você errou. Vai ter que voltar para a Escola Bíblica Dominical. Fim de jogo!"';
                desativarTudo();
            }
        }

        function usarAlunos() {
            if (alunosUsado) return;
            alunosUsado = true;
            document.getElementById('btn-alunos').disabled = true;
            
            const correta = perguntas[perguntaAtual].answer;
            const letra = correta + 1;
            hostMsgEl.innerText = `Pastor André Fernandes: "Os alunos da Universidade Solus Scriptura abriram as Bíblias de estudo e disseram que a resposta tem 99% de chance de ser a número ${letra}!"`;
        }

        function usarPulo() {
            if (pulosRestantes > 0) {
                pulosRestantes--;
                document.getElementById('qtd-pulos').innerText = pulosRestantes;
                hostMsgEl.innerText = 'Pastor André Fernandes: "Você pulou! Vamos para uma nova pergunta."';
                perguntaAtual++;
                if (pulosRestantes === 0) document.getElementById('btn-pulo').disabled = true;
                carregarPergunta();
            }
        }

        function usarMarcus() {
            if (marcusUsado) return;
            marcusUsado = true;
            document.getElementById('btn-marcus').disabled = true;

            const correta = perguntas[perguntaAtual].answer;
            let erradas = [0, 1, 2, 3].filter(i => i !== correta);
            
            // Embaralha as erradas e pega 2 para eliminar
            erradas = erradas.sort(() => 0.5 - Math.random()).slice(0, 2);

            erradas.forEach(index => {
                const btn = document.getElementById(`opt-${index}`);
                if(btn) {
                    btn.disabled = true;
                    btn.innerText = '--- ELIMINADA PELO MARCUS ---';
                }
            });

            hostMsgEl.innerText = 'Pastor André Fernandes: "Atenção! Marcus da Mídia entrou na mesa de corte e tirou 2 alternativas erradas da sua tela!"';
        }

        function desativarTudo() {
            optionsEl.childNodes.forEach(btn => btn.disabled = true);
            document.getElementById('btn-alunos').disabled = true;
            document.getElementById('btn-pulo').disabled = true;
            document.getElementById('btn-marcus').disabled = true;
        }

        function venceuJogo() {
            questionEl.innerText = "PARABÉNS!!!";
            optionsEl.innerHTML = '';
            hostMsgEl.innerText = 'Pastor André Fernandes: "Você zerou o jogo! Arrume as malas, sua passagem SÓ DE IDA para Curionópolis já está garantida! Deus abençoe!"';
            desativarTudo();
        }

        // Inicia o jogo
        carregarPergunta();
    </script>
</body>
</html>
