<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sansão & Pompom: A Caçada - Macedo Game Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           MACEDO STUDIO - DESIGN SYSTEM
           ========================================= */
        :root {
            --brand-color: #f39c12;
            --brand-dark: #d35400;
            --bg-color: #1a1a2e;
            --text-light: #ecf0f1;
            --canvas-bg: #d4a373;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Press Start 2P', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        /* Container do Jogo (Mantém proporção 16:9 ou estica no mobile) */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            max-height: 900px;
            background-color: var(--canvas-bg);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* =========================================
           TELAS DE INTERFACE (UI OVERLAYS)
           ========================================= */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.95);
            z-index: 10;
            transition: opacity 0.3s;
        }

        .hidden { opacity: 0; pointer-events: none; }

        /* Estilo da Tela de Início (Macedo Game Studio) */
        .studio-brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        
        .studio-brand span { color: var(--brand-color); font-weight: 900; }

        .game-title {
            font-size: 1.8rem;
            color: var(--brand-color);
            text-align: center;
            line-height: 1.5;
            text-shadow: 4px 4px 0px var(--brand-dark);
            margin-bottom: 40px;
        }

        /* Botões Profissionais */
        .btn {
            background: var(--brand-color);
            color: #fff;
            border: none;
            border-bottom: 6px solid var(--brand-dark);
            border-radius: 12px;
            padding: 20px 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.1s, border-width 0.1s;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 16px;
        }

        .cat-select-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .cat-btn {
            background: #2c3e50;
            border-bottom-color: #1a252f;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
        }

        .cat-btn.active {
            background: #27ae60;
            border-bottom-color: #1e8449;
        }

        .cat-avatar { width: 64px; height: 64px; image-rendering: pixelated; }

        /* HUD do Jogo (In-game) */
        #hud {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .hud-panel {
            background: rgba(0,0,0,0.6);
            border: 2px solid #555;
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="hud" class="hidden">
            <div class="hud-panel">🐟 <span id="score-display">000</span></div>
            <div class="hud-panel">⏱️ <span id="time-display">02:30</span></div>
        </div>

        <div id="start-screen" class="ui-layer">
            <div class="studio-brand">Macedo <span>Game Studio</span></div>
            <h1 class="game-title">SANSÃO E POMPOM<br>A CAÇADA</h1>
            
            <p style="font-size: 0.6rem; color: #bdc3c7; margin-bottom: 15px;">ESCOLHA SEU CAÇADOR:</p>
            
            <div class="cat-select-container">
                <button class="btn cat-btn active" id="btn-sansao" onclick="game.selectHunter('sansao')">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'><rect x='1' y='2' width='8' height='7' fill='%23111'/><rect x='1' y='0' width='2' height='2' fill='%23111'/><rect x='7' y='0' width='2' height='2' fill='%23111'/><rect x='2' y='4' width='2' height='2' fill='%23FFD700'/><rect x='6' y='4' width='2' height='2' fill='%23FFD700'/></svg>" class="cat-avatar">
                    SANSÃO
                </button>
                <button class="btn cat-btn" id="btn-pompom" onclick="game.selectHunter('pompom')">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'><rect x='1' y='2' width='8' height='4' fill='%238B4513'/><rect x='1' y='0' width='2' height='2' fill='%238B4513'/><rect x='7' y='0' width='2' height='2' fill='%238B4513'/><rect x='2' y='2' width='1' height='2' fill='%23111'/><rect x='5' y='2' width='1' height='2' fill='%23111'/><rect x='7' y='2' width='1' height='2' fill='%23111'/><rect x='1' y='6' width='8' height='3' fill='%23FFF'/><rect x='2' y='4' width='2' height='2' fill='%232ecc71'/><rect x='6' y='4' width='2' height='2' fill='%232ecc71'/></svg>" class="cat-avatar">
                    POMPOM
                </button>
            </div>

            <button class="btn" onclick="game.start()">INICIAR JOGO ▶</button>
        </div>

        <div id="game-over-screen" class="ui-layer hidden">
            <h1 class="game-title" style="color: #e74c3c; text-shadow: 4px 4px 0px #c0392b;">FIM DA CAÇADA</h1>
            <p style="font-size: 1rem; margin-bottom: 10px;">PONTUAÇÃO FINAL:</p>
            <p id="final-score" style="font-size: 3rem; color: var(--brand-color); margin-bottom: 40px; text-shadow: 3px 3px 0 #000;">0</p>
            <button class="btn" onclick="location.reload()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        /**
         * ENGINE DE ÁUDIO BIOACÚSTICO
         * Responsável por sintetizar frequências atrativas para felinos.
         */
        class BioAudioEngine {
            constructor() { this.ctx = null; }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            playSqueak() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(9000, now);
                osc.frequency.exponentialRampToValueAtTime(15000, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        /**
         * CLASSE ENTIDADE: RATO
         * Gerencia a física e renderização de cada presa na tela.
         */
        class MouseEntity {
            constructor(canvasWidth, yPosition, speed) {
                this.width = 60;
                this.height = 30;
                this.y = yPosition - this.height; // Fica em cima da prateleira
                this.speed = speed;
                this.isGoingRight = Math.random() > 0.5;
                this.x = this.isGoingRight ? -this.width : canvasWidth;
                this.markedForDeletion = false;

                // Gráfico em SVG codificado (Alta Performance)
                this.image = new Image();
                this.image.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 5'><rect x='2' y='2' width='6' height='3' fill='%237f8c8d'/><rect x='7' y='1' width='2' height='2' fill='%2395a5a6'/><rect x='8' y='2' width='1' height='1' fill='%23000'/><rect x='0' y='3' width='2' height='1' fill='%23e74c3c'/><rect x='6' y='0' width='1' height='1' fill='%23e74c3c'/></svg>";
            }

            update(deltaTime, canvasWidth) {
                if (this.isGoingRight) {
                    this.x += this.speed * deltaTime;
                    if (this.x > canvasWidth) this.markedForDeletion = true;
                } else {
                    this.x -= this.speed * deltaTime;
                    if (this.x < -this.width) this.markedForDeletion = true;
                }
            }

            draw(ctx) {
                ctx.save();
                if (!this.isGoingRight) {
                    // Espelha a imagem se estiver correndo para a esquerda
                    ctx.translate(this.x + this.width, this.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(this.image, 0, 0, this.width, this.height);
                } else {
                    ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
                }
                ctx.restore();
            }
        }

        /**
         * SISTEMA DE PARTÍCULAS
         * Para o "Game Feel" (Feedback visual ao acertar)
         */
        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vy = -0.1; // Sobe
                this.life = 1.0;
                this.markedForDeletion = false;
            }
            update(deltaTime) {
                this.y += this.vy * deltaTime;
                this.life -= 0.002 * deltaTime;
                if (this.life <= 0) this.markedForDeletion = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = '#f1c40f';
                ctx.font = '20px "Press Start 2P"';
                ctx.fillText('+10', this.x - 25, this.y);
                ctx.restore();
            }
        }

        /**
         * CORE DO JOGO (ENGINE PRINCIPAL)
         */
        class MacedoGameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.audio = new BioAudioEngine();
                
                this.width = this.canvas.width = this.canvas.offsetWidth;
                this.height = this.canvas.height = this.canvas.offsetHeight;
                
                this.state = 'MENU'; // MENU, PLAYING, GAMEOVER
                this.selectedHunter = 'sansao';
                
                // Variáveis de Gameplay
                this.score = 0;
                this.timeRemaining = 150; // 2:30
                this.mice = [];
                this.particles = [];
                this.shelves = [this.height * 0.3, this.height * 0.6, this.height * 0.9];
                
                this.lastTime = 0;
                this.spawnTimer = 0;
                this.spawnInterval = 1000;

                // Eventos de Input (Toque/Mouse)
                this.canvas.addEventListener('pointerdown', (e) => this.handleInput(e));
                window.addEventListener('resize', () => this.resize());

                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            resize() {
                this.width = this.canvas.width = this.canvas.offsetWidth;
                this.height = this.canvas.height = this.canvas.offsetHeight;
                this.shelves = [this.height * 0.3, this.height * 0.6, this.height * 0.9];
            }

            selectHunter(hunter) {
                this.selectedHunter = hunter;
                document.getElementById('btn-sansao').classList.toggle('active', hunter === 'sansao');
                document.getElementById('btn-pompom').classList.toggle('active', hunter === 'pompom');
            }

            start() {
                this.audio.init();
                this.state = 'PLAYING';
                this.score = 0;
                this.timeRemaining = 150;
                this.mice = [];
                this.particles = [];
                
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                
                this.lastTime = performance.now();
                this.secondTimer = setInterval(() => {
                    if(this.state === 'PLAYING') {
                        this.timeRemaining--;
                        this.updateHUD();
                        if(this.timeRemaining <= 0) this.gameOver();
                    }
                }, 1000);
            }

            updateHUD() {
                const m = Math.floor(this.timeRemaining / 60);
                const s = this.timeRemaining % 60;
                document.getElementById('time-display').innerText = `0${m}:${s.toString().padStart(2, '0')}`;
                document.getElementById('score-display').innerText = this.score.toString().padStart(3, '0');
            }

            handleInput(e) {
                if (this.state !== 'PLAYING') return;
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Hitbox Collision Detection
                for (let i = this.mice.length - 1; i >= 0; i--) {
                    const mouse = this.mice[i];
                    // Área de toque expandida (Hitbox generosa para mobile)
                    if (x > mouse.x - 20 && x < mouse.x + mouse.width + 20 &&
                        y > mouse.y - 30 && y < mouse.y + mouse.height + 30) {
                        
                        this.audio.playSqueak();
                        this.score += 10;
                        this.updateHUD();
                        
                        // Cria partícula e remove o rato
                        this.particles.push(new Particle(mouse.x + mouse.width/2, mouse.y));
                        this.mice.splice(i, 1);
                        
                        // Flash na tela
                        this.canvas.style.backgroundColor = '#e67e22';
                        setTimeout(() => this.canvas.style.backgroundColor = 'var(--canvas-bg)', 50);
                        break; // Acerta apenas um rato por toque
                    }
                }
            }

            gameOver() {
                this.state = 'GAMEOVER';
                clearInterval(this.secondTimer);
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('game-over-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = this.score;
            }

            // GAME LOOP PRINCIPAL (Executa a ~60FPS)
            loop(timestamp) {
                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;

                if (this.state === 'PLAYING') {
                    this.ctx.clearRect(0, 0, this.width, this.height);

                    // Desenha o Cenário (Prateleiras)
                    this.ctx.fillStyle = '#8d6e63'; // Frente da prateleira
                    this.shelves.forEach(y => {
                        this.ctx.fillRect(0, y, this.width, 25);
                        this.ctx.fillStyle = '#5d4037'; // Sombra da prateleira
                        this.ctx.fillRect(0, y + 20, this.width, 5);
                        this.ctx.fillStyle = '#8d6e63'; // Reseta cor
                    });

                    // Sistema de Spawn de Presas
                    if (this.spawnTimer > this.spawnInterval) {
                        const randomShelf = this.shelves[Math.floor(Math.random() * this.shelves.length)];
                        // Velocidade aumenta conforme os pontos
                        const speed = 0.15 + (this.score * 0.0005) + (Math.random() * 0.1); 
                        this.mice.push(new MouseEntity(this.width, randomShelf, speed));
                        this.spawnTimer = 0;
                        // O tempo de spawn diminui, deixando o jogo mais frenético
                        this.spawnInterval = Math.max(400, 1500 - (this.score * 2));
                    } else {
                        this.spawnTimer += deltaTime;
                    }

                    // Atualiza e Desenha Ratos
                    this.mice.forEach(mouse => {
                        mouse.update(deltaTime, this.width);
                        mouse.draw(this.ctx);
                    });
                    this.mice = this.mice.filter(mouse => !mouse.markedForDeletion);

                    // Atualiza e Desenha Partículas
                    this.particles.forEach(p => {
                        p.update(deltaTime);
                        p.draw(this.ctx);
                    });
                    this.particles = this.particles.filter(p => !p.markedForDeletion);
                }

                requestAnimationFrame(this.loop);
            }
        }

        // Inicializa o Engine quando a janela carregar
        window.onload = () => {
            window.game = new MacedoGameEngine();
        };

    </script>
</body>
</html>
